<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Calculator</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: teal;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        h1 {
            font-family: cambria;
            color: white;
            text-align: center;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            max-width: 350px;
            height: auto;
            background: white;
            padding: 10px;
            border-radius: 10px;
        }

        input[type="button"] {
            width: 100%;
            height: 60px;
            cursor: pointer;
            background-color: lightgray;
            border: none;
            font-size: 18px;
            border-radius: 5px;
        }

        input[type="button"]:hover {
            background-color: #ddd;
        }

        input[type="text"] {
            width: 100%;
            height: 60px;
            font-size: 22px;
            text-align: right;
            padding: 10px;
        }

    </style>
</head>

<body>

    <h1>CALCULATOR</h1>

    <table cellpadding="5px" align="center">

        <tr>
            <th colspan="3"><input type="text" id="a" readonly></th>
            <th><input type="button" value="C" onclick="clr()"></th>
        </tr>

        <tr>
            <th><input type="button" value="1" onclick="pick(1)"></th>
            <th><input type="button" value="2" onclick="pick(2)"></th>
            <th><input type="button" value="3" onclick="pick(3)"></th>
            <th><input type="button" value="/" onclick="pick('/')"></th>
        </tr>

        <tr>
            <th><input type="button" value="4" onclick="pick(4)"></th>
            <th><input type="button" value="5" onclick="pick(5)"></th>
            <th><input type="button" value="6" onclick="pick(6)"></th>
            <th><input type="button" value="-" onclick="pick('-')"></th>
        </tr>

        <tr>
            <th><input type="button" value="7" onclick="pick(7)"></th>
            <th><input type="button" value="8" onclick="pick(8)"></th>
            <th><input type="button" value="9" onclick="pick(9)"></th>
            <th><input type="button" value="+" onclick="pick('+')"></th>
        </tr>

        <tr>
            <th><input type="button" value="." onclick="pick('.')"></th>
            <th><input type="button" value="0" onclick="pick(0)"></th>
            <th><input type="button" value="=" onclick="solve()"></th>
            <th><input type="button" value="*" onclick="pick('*')"></th>
        </tr>

        <tr>
            <th colspan="4"><input type="button" value="X" onclick="back()"></th>
        </tr>

    </table>

    <script>
        function pick(val) {
            document.getElementById("a").value += val;
        }

        function solve() {
            var x = document.getElementById("a").value;
            var y = eval(x);
            document.getElementById("a").value = y;
        }

        function clr() {
            document.getElementById("a").value = "";
        }

        function back() {
            var z = document.getElementById("a");
            z.value = z.value.slice(0, -1);
        }
    </script>

</body>

</html>
